name: bundle

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master

      - uses: jdx/mise-action@v3

      - name: Build
        run: |
          pnpm i --prod --ignore-scripts
          pnpm run fix-getopts-import
          pnpm run build
        env:
          GIT_REV: ${{ github.sha }}

      - name: Synchronize Languages
        run: node synchronize-available.js

      - name: Test
        run: ./run-tests.sh

      - name: Deploy
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: dist
          FOLDER: dist
          SQUASH_HISTORY: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
