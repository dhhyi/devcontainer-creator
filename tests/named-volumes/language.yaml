extends: dcc://javascript-pnpm
devcontainer:
  selftest: |
    mkdir -p $HOME/project
    cd $HOME/project
    echo '{"name":"test","dependencies":{"prettier":"*"}}' > package.json
    pnpm install
    ./node_modules/.bin/prettier --version
extras:
  - named-volumes
namedVolumes:
  node_modules: dcc-test-node-modules
  $HOME/.cache/pnpm: dcc-test-pnpm-cache
