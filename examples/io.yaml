extends: dcc://ubuntu
devcontainer:
  publish:
    image: dcc://io
    labels:
      org.opencontainers.image.description: VSCode devcontainer for io
      org.opencontainers.image.source: https://github.com/dhhyi/devcontainer-creator
  build:
    args:
      IO_VERSION: 8d1566b5edf8f378618fc7739518d7a5c56de654
    packages:
      - build-essential
      - libpcre3-dev
      - libevent-dev
      - cmake
      - pkgconf
    user:
      - RUN git clone --branch native --recursive https://github.com/IoLanguage/io.git /tmp/io
      - RUN cd /tmp/io && git checkout $IO_VERSION
      - RUN cd /tmp/io && mkdir build
      - RUN cd /tmp/io/build && cmake -DCMAKE_BUILD_TYPE=release ..
      - RUN cd /tmp/io/build && make
      - RUN cd /tmp/io/build && sudo make install
      - RUN cd /tmp/io/build && io_static setup.io

      - ENV EERIEDIR=${HOME}/.eerie PATH=${PATH}:${HOME}/.eerie/base/bin:${HOME}/.eerie/activeEnv/bin
      - WORKDIR ${HOME}
      - RUN eerie install https://github.com/IoLanguage/Regex.git
      - RUN eerie install https://github.com/IoLanguage/Random.git
  selftest: io -e 'Random clone ; Regex clone ; Lobby Protos Addons slotNames asJson println ; "Hello World!" println' | grep -1 'Hello World!'
vscode:
  extensions:
    - kennethceyer.io
