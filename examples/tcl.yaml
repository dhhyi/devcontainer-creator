extends: dcc://debian
devcontainer:
  publish:
    image: dcc://tcl
    labels:
      org.opencontainers.image.description: VSCode devcontainer for tcl
      org.opencontainers.image.source: https://github.com/dhhyi/devcontainer-creator
  build:
    packages:
      - tcl
  selftest: echo 'puts "Hello World!"' | tclsh
vscode:
  extensions:
    - bitwisecook.tcl
